<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NumberGuessingGame</title>
    <link rel="stylesheet" href="NumberGuessingGame.css">
</head>
<body>
    <h1>Welcome to Number Guessing Game!!</h1>
    
    <div class="Lives-Display">
        Lives: <span id="Lives-Count">5</span>
    </div>

    <div class="userInput">
        <input type="text" placeholder="Enter a number(1-100)">
    </div>
    <div class="box">
       <button>1</button>
       <button>2</button>
       <button>3</button>
       <button>4</button>
       <button>5</button>
       <button>6</button>
       <button>7</button>
       <button>8</button>
       <button>9</button>
       <button>0</button>
    </div>

    <div class="submit">
        <button type="submit" id="submit">Submit</button>
        <button type="reset" id="clear">clear</button>
    </div>

    <script src="NumberGuessingGame.js"></script>
</body>
</html>
